<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登錄</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.12); width: 360px; }
        h2 { text-align: center; margin-bottom: 28px; color: #333; }
        label { display: block; margin-bottom: 4px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; margin-bottom: 16px; outline: none; }
        input:focus { border-color: #1890ff; }
        button { width: 100%; padding: 11px; background: #1890ff; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        button:hover { background: #40a9ff; }
        .msg-error { color: #f5222d; font-size: 13px; text-align: center; margin-bottom: 14px; }
        .msg-logout { color: #52c41a; font-size: 13px; text-align: center; margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>系統登錄</h2>

    <p class="msg-error" th:if="${param.error}">帳號或密碼錯誤，請重試</p>
    <p class="msg-logout" th:if="${param.logout}">已成功退出登錄</p>

    <!--
        action="/login" 是 Spring Security 默認攔截的登錄提交地址
        name="username" 和 name="password" 是 Spring Security 默認識別的字段名
    -->
    <form th:action="@{/login}" method="post">
        <label>帳號</label>
        <input type="text" name="username" placeholder="請輸入帳號" autofocus/>

        <label>密碼</label>
        <input type="password" name="password" placeholder="請輸入密碼"/>

        <button type="submit">登錄</button>
    </form>
</div>
</body>
</html>
