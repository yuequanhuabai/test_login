<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>首頁</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; }
        .header { background: #001529; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; }
        .main { max-width: 860px; margin: 30px auto; display: flex; flex-direction: column; gap: 20px; }

        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 24px; }
        .card h3 { font-size: 15px; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }

        .info-grid { display: grid; grid-template-columns: 160px 1fr; gap: 10px 0; font-size: 14px; }
        .info-grid .label { color: #888; padding: 6px 0; }
        .info-grid .value { color: #333; padding: 6px 0; font-family: monospace; word-break: break-all; }

        .badge { display: inline-block; background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; padding: 1px 8px; border-radius: 3px; font-size: 13px; }
        .badge-green { background: #f6ffed; border-color: #b7eb8f; color: #52c41a; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fafafa; color: #666; font-weight: 500; text-align: left; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f7f7f7; color: #333; word-break: break-all; font-family: monospace; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .logout-btn { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .logout-btn:hover { background: rgba(255,255,255,.1); }
        .refresh-tip { font-size: 12px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Spring Security 認證演示</h1>
    <form th:action="@{/logout}" method="post">
        <button class="logout-btn" type="submit">退出登錄</button>
    </form>
</div>

<div class="main">

    <!-- Session 信息 -->
    <div class="card">
        <h3>Session 信息</h3>
        <div class="info-grid">
            <span class="label">當前用戶</span>
            <span class="value"><span class="badge" th:text="${username}"></span></span>

            <span class="label">Session ID</span>
            <span class="value" th:text="${sessionId}"></span>

            <span class="label">登錄時間</span>
            <span class="value" th:text="${loginTime}"></span>

            <span class="label">本次會話訪問次數</span>
            <span class="value">
                <span class="badge-green badge" th:text="${visitCount} + ' 次'"></span>
                &nbsp;<span style="font-family:sans-serif;color:#999;font-size:12px">（刷新頁面會增加）</span>
            </span>

            <span class="label">Session 超時時間</span>
            <span class="value" th:text="${maxInactiveInterval} + ' 秒（' + ${maxInactiveInterval / 60} + ' 分鐘不操作自動失效）'"></span>
        </div>
    </div>

    <!-- Cookie 列表 -->
    <div class="card">
        <h3>當前請求攜帶的 Cookie</h3>
        <table>
            <thead>
                <tr>
                    <th>名稱</th>
                    <th>值</th>
                    <th>有效期</th>
                    <th>Path</th>
                    <th>HttpOnly</th>
                    <th>Secure</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${cookies}">
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.value}"></td>
                    <td th:text="${c.maxAge}"></td>
                    <td th:text="${c.path}"></td>
                    <td th:text="${c.httpOnly}"></td>
                    <td th:text="${c.secure}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(cookies)}">
                    <td colspan="6" style="text-align:center;color:#999">無 Cookie</td>
                </tr>
            </tbody>
        </table>
        <p class="refresh-tip">
            JSESSIONID = 服務端 Session 的唯一標識，瀏覽器關閉即消失<br>
            remember-me = 勾選「記住我」後生成，有效期 7 天，瀏覽器關閉後仍存在
        </p>
    </div>

</div>
</body>
</html>
