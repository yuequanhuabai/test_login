<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>首頁</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; }
        .header { background: #001529; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; }
        .header a { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid rgba(255,255,255,.4); padding: 5px 14px; border-radius: 4px; }
        .header a:hover { background: rgba(255,255,255,.1); }
        .content { max-width: 700px; margin: 60px auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
        .content h2 { color: #333; margin-bottom: 16px; }
        .content p { color: #666; line-height: 1.8; }
        .tag { display: inline-block; background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; padding: 2px 10px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <h1>管理系統</h1>
    <!-- Spring Security 提供 /logout，需要 POST 請求防止 CSRF -->
    <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit" style="background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:14px;">退出登錄</button>
    </form>
</div>

<div class="content">
    <h2>歡迎回來！</h2>
    <p>當前登錄帳號：<span class="tag" th:text="${username}"></span></p>
    <br>
    <p>你現在看到這個頁面，說明 Spring Security 已完成認證。</p>
    <p>Session 已創建，JSESSIONID Cookie 已寫入瀏覽器。</p>
    <p>點擊「退出登錄」後，Session 會被銷毀，再次訪問此頁面將跳回登錄頁。</p>
</div>
</body>
</html>
